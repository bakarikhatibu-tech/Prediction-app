<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iOS-Ready Prediction Model</title>
<style>
body { font-family: Arial; text-align: center; background:#0f172a; color:white; margin:0; }
h1 { margin-top:15px; font-size:22px; }
#timer { margin:10px; font-size:18px; color:#facc15; }
#grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; padding:10px; }
.box { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:10px; background:#1e293b; font-size:18px; }
.safe { background:#2563eb; }
.bomb { background:#dc2626; }
.predicted { outline:3px solid yellow; }
.confidence { font-size:10px; margin-top:4px; color:#fff; }
button { margin:10px; padding:10px; border:none; border-radius:8px; background:#22c55e; color:white; }
#history { text-align:left; padding:10px; max-height:200px; overflow:auto; font-size:12px; }
</style>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
</head>
<body>
<h1>iOS-Ready 25-Box Prediction Model</h1>
<div id="timer"></div>
<button onclick="manualReset()">Reset</button>
<div id="grid"></div>
<h3>Prediction History</h3>
<div id="history"></div>
<script>
let gridData = [];
let prediction = [];
let confidence = {};
let historyLog = [];
let memoryWeights = Array(25).fill(1);
let countdown = 900;
function generateGrid() {
  let items = Array(20).fill('safe').concat(Array(5).fill('bomb'));
  items.sort(() => Math.random() - 0.5);
  gridData = items;
  makePrediction();
  evaluatePrediction();
  renderGrid();
}
function makePrediction() {
  let weighted = gridData.map((v,i)=>v==='safe'?memoryWeights[i]:0);
  let selected=[];
  for(let k=0;k<3;k++){
    let total=weighted.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    let sum=0;
    for(let i=0;i<weighted.length;i++){
      sum+=weighted[i];
      if(r<=sum && !selected.includes(i)){
        selected.push(i);
        weighted[i]=0;
        break;
      }
    }
  }
  prediction=selected;
  prediction.forEach(i=>{confidence[i]=Math.min(100,Math.round(memoryWeights[i]*10));});
}
function evaluatePrediction(){
  let result=prediction.map(i=>gridData[i]==='safe');
  prediction.forEach((i,idx)=>{
    if(result[idx]) memoryWeights[i]+=0.5;
    else memoryWeights[i]=Math.max(1,memoryWeights[i]-0.7);
  });
  historyLog.unshift({time:new Date().toLocaleTimeString(),prediction,result});
  updateHistory();
}
function updateHistory(){
  const div=document.getElementById('history');
  div.innerHTML=historyLog.slice(0,20).map(h=>
    `<div>[${h.time}] Picks: ${h.prediction.join(', ')} | Result: ${h.result.map(r=>'✔':'✖').join(' ')}</div>`
  ).join('');
}
function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  gridData.forEach((item,index)=>{
    const div=document.createElement('div');
    div.classList.add('box');
    if(item==='safe'){div.classList.add('safe'); div.innerHTML='★';}
    else{div.classList.add('bomb'); div.innerHTML='💣';}
    if(prediction.includes(index)){
      div.classList.add('predicted');
      let conf=document.createElement('div');
      conf.className='confidence';
      conf.innerText=confidence[index]+'%';
      div.appendChild(conf);
    }
    grid.appendChild(div);
  });
}
function updateTimer(){
  const m=Math.floor(countdown/60);
  const s=countdown%60;
  document.getElementById('timer').textContent=`Next update in: ${m}:${s.toString().padStart(2,'0')}`;
  if(countdown<=0){generateGrid(); countdown=900;} else{countdown--;}
}
function manualReset(){generateGrid(); countdown=900;}
setInterval(updateTimer,1000);
generateGrid();
</script>
</body>
</html>
